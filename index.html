<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой Telegram App</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        button {
            background: var(--tg-theme-button-color, '#2481cc');
            color: var(--tg-theme-button-text-color, '#ffffff');
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .info {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Моё приложение</h1>
        <div class="info" id="userInfo">
            Загрузка...
        </div>
        <button id="closeBtn">Закрыть</button>
        <button id="alertBtn">Показать уведомление</button>
    </div>

    <!-- Подключаем Telegram Web App SDK -->
    <script src="telegramwebapp.js"></script>
    
    <script>
        // Инициализация
        let tg = window.Telegram.WebApp;
        
        // Сообщаем, что приложение готово
        tg.ready();
        
        // Расширяем на весь экран
        tg.expand();
        
        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user;
        const userInfoDiv = document.getElementById('userInfo');
        
        if (user) {
            userInfoDiv.innerHTML = `
                <strong>👤 Ваши данные:</strong><br>
                ID: ${user.id}<br>
                Имя: ${user.first_name} ${user.last_name || ''}<br>
                Username: ${user.username ? '@' + user.username : 'не указан'}<br>
                Язык: ${user.language_code || 'не указан'}
            `;
        } else {
            userInfoDiv.innerHTML = '⚠️ Данные пользователя не получены';
        }
        
        // Кнопка закрытия
        document.getElementById('closeBtn').addEventListener('click', () => {
            tg.close();
        });
        
        // Кнопка уведомления
        document.getElementById('alertBtn').addEventListener('click', () => {
            tg.showAlert('Привет из веб-приложения!');
        });
        
        // Меняем цвет кнопок в зависимости от темы Telegram
        document.body.style.backgroundColor = tg.backgroundColor;
    </script>
</body>
</html>
